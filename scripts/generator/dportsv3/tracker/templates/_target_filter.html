{# Inline target+origin filter form used by agentic list pages. #}
<form method="get" class="row row-cols-lg-auto g-2 align-items-center mb-3">
  <div class="col-12">
    <label class="form-label mb-0 me-2">Target</label>
    <select class="form-select form-select-sm" name="target" onchange="this.form.submit()">
      <option value="">(all)</option>
      {% for t in target_options %}
      <option value="{{ t }}"{% if t == selected_target %} selected{% endif %}>{{ t }}</option>
      {% endfor %}
    </select>
  </div>
  {% if show_state %}
  <div class="col-12">
    <label class="form-label mb-0 me-2">State</label>
    <select class="form-select form-select-sm" name="state" onchange="this.form.submit()">
      <option value="">(all)</option>
      {% for s in ['pending', 'inflight', 'done', 'failed'] %}
      <option value="{{ s }}"{% if s == selected_state %} selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}
  {% if show_origin %}
  <div class="col-12">
    <label class="form-label mb-0 me-2">Origin</label>
    <input class="form-control form-control-sm" type="text" name="origin" value="{{ selected_origin or '' }}" placeholder="cat/port">
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-sm btn-outline-primary">Apply</button>
  </div>
  {% endif %}
</form>
