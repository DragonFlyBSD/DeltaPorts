name: dportsv3 migration policy

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened ]

jobs:
  migration-policy:
    name: Migration policy gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare artifact directory
        run: mkdir -p artifacts/migration

      - name: Collect changed files
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > artifacts/migration/changed-files.txt

      - name: Derive touched origins
        run: |
          PYTHONPATH=scripts/generator python - <<'PY'
          from pathlib import Path
          from dportsv3.migration.touched import extract_touched_origins

          changed_path = Path("artifacts/migration/changed-files.txt")
          touched_path = Path("artifacts/migration/touched-origins.txt")
          changed = [line.strip() for line in changed_path.read_text().splitlines() if line.strip()]
          touched = extract_touched_origins(changed)
          touched_path.write_text("\n".join(touched) + ("\n" if touched else ""))
          PY

      - name: Build migration inventory
        run: |
          PYTHONPATH=scripts/generator python -m dportsv3 migrate inventory --root . --json > artifacts/migration/inventory.json

      - name: Classify migration inventory
        run: |
          PYTHONPATH=scripts/generator python -m dportsv3 migrate classify artifacts/migration/inventory.json --json > artifacts/migration/classified.json

      - name: Enforce touched dops-first policy
        run: |
          PYTHONPATH=scripts/generator python -m dportsv3 migrate policy-check artifacts/migration/classified.json --touched artifacts/migration/touched-origins.txt --strict --json > artifacts/migration/policy.json

      - name: Evaluate migration progress
        run: |
          PYTHONPATH=scripts/generator python -m dportsv3 migrate progress artifacts/migration/classified.json --json > artifacts/migration/progress.json

      - name: Build migration dashboard artifact
        run: |
          PYTHONPATH=scripts/generator python -m dportsv3 migrate dashboard artifacts/migration/classified.json --touched artifacts/migration/touched-origins.txt --strict-policy --json > artifacts/migration/dashboard.json

      - name: Upload migration dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dportsv3-migration-dashboard
          path: artifacts/migration
